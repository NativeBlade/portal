# 16 KB ELF page alignment is required by Google Play for apps targeting
# Android 15+. NDK r28+ aligns by default; the explicit flag guarantees it
# regardless of the installed NDK version.

[target.aarch64-linux-android]
linker = "C:/Users/siste/AppData/Local/Android/Sdk/ndk/28.2.13676358/toolchains/llvm/prebuilt/windows-x86_64/bin/aarch64-linux-android24-clang.cmd"
rustflags = ["-C", "link-arg=-Wl,-z,max-page-size=16384"]

[target.armv7-linux-androideabi]
linker = "C:/Users/siste/AppData/Local/Android/Sdk/ndk/28.2.13676358/toolchains/llvm/prebuilt/windows-x86_64/bin/armv7a-linux-androideabi24-clang.cmd"
