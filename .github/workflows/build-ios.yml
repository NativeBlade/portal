name: Build iOS

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      upload_to_testflight:
        description: 'Upload to TestFlight after build'
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  build:
    runs-on: macos-14
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: mbstring, intl, dom, fileinfo, sqlite3, pdo_sqlite, gd
          coverage: none
          tools: composer:v2

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-ios

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: cargo-ios-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: cargo-ios-

      - name: Install dependencies
        run: |
          composer install --no-dev --prefer-dist --no-progress
          npm ci

      - name: Decode signing certificate
        env:
          IOS_DIST_CERT_BASE64: ${{ secrets.IOS_DIST_CERT_BASE64 }}
          IOS_DIST_CERT_PASSWORD: ${{ secrets.IOS_DIST_CERT_PASSWORD }}
        run: |
          echo "$IOS_DIST_CERT_BASE64" | base64 --decode > $RUNNER_TEMP/cert.p12

          security create-keychain -p ci $RUNNER_TEMP/build.keychain
          security set-keychain-settings -lut 21600 $RUNNER_TEMP/build.keychain
          security default-keychain -s $RUNNER_TEMP/build.keychain
          security unlock-keychain -p ci $RUNNER_TEMP/build.keychain

          security import $RUNNER_TEMP/cert.p12 \
            -k $RUNNER_TEMP/build.keychain \
            -P "$IOS_DIST_CERT_PASSWORD" \
            -T /usr/bin/codesign \
            -T /usr/bin/security

          security set-key-partition-list -S apple-tool:,apple: -s -k ci $RUNNER_TEMP/build.keychain
          security list-keychains -d user -s $RUNNER_TEMP/build.keychain login.keychain

      - name: Install provisioning profile
        env:
          IOS_PROFILE_BASE64: ${{ secrets.IOS_PROFILE_BASE64 }}
        run: |
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          echo "$IOS_PROFILE_BASE64" | base64 --decode \
            > ~/Library/MobileDevice/Provisioning\ Profiles/distribution.mobileprovision

      - name: Add iOS platform
        run: php artisan nativeblade:add ios

      - name: Configure NativeBlade
        run: php artisan nativeblade:config

      - name: Build iOS
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          # Inject team ID into project
          if [ -d src-tauri/gen/apple ]; then
            cat > src-tauri/gen/apple/project.xcconfig <<EOF
          DEVELOPMENT_TEAM = $APPLE_TEAM_ID
          CODE_SIGN_STYLE = Manual
          EOF
          fi

          php artisan nativeblade:build ios

      - name: Locate IPA
        id: ipa
        run: |
          IPA=$(find build/ios src-tauri/gen/apple -name "*.ipa" | head -n 1)
          if [ -z "$IPA" ]; then
            echo "::error::No IPA produced"
            exit 1
          fi
          echo "path=$IPA" >> "$GITHUB_OUTPUT"
          echo "Built: $IPA"

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-ipa
          path: ${{ steps.ipa.outputs.path }}
          retention-days: 14

      - name: Upload to TestFlight
        if: github.event.inputs.upload_to_testflight == 'true' || startsWith(github.ref, 'refs/tags/v')
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
        run: |
          xcrun altool --upload-app \
            --type ios \
            --file "${{ steps.ipa.outputs.path }}" \
            --username "$APPLE_ID" \
            --password "$APPLE_APP_PASSWORD" \
            --verbose

      - name: Cleanup keychain
        if: always()
        run: |
          security delete-keychain $RUNNER_TEMP/build.keychain || true
          rm -f $RUNNER_TEMP/cert.p12 || true
