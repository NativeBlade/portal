name: Build Desktop

on:
  workflow_dispatch:
  push:
    tags:
      - 'desktop-v*'

permissions:
  contents: read

env:
  NODE_VERSION: '20'
  PHP_VERSION: '8.3'
  AWS_REGION: us-east-1
  S3_BUCKET: nativeblade-portal-releases

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            target: windows
            rust-target: x86_64-pc-windows-msvc
          - os: macos-latest
            target: macos
            rust-target: aarch64-apple-darwin
          - os: ubuntu-latest
            target: linux
            rust-target: x86_64-unknown-linux-gnu

    runs-on: ${{ matrix.os }}
    timeout-minutes: 90

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ env.PHP_VERSION }}
          extensions: mbstring, intl, dom, fileinfo, sqlite3, pdo_sqlite, gd
          coverage: none
          tools: composer:v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          COMPOSER_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-target }}

      - name: Install Linux build dependencies
        if: matrix.target == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev

      - name: Setup Java for SSL.com CodeSignTool
        if: matrix.target == 'windows'
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Download SSL.com CodeSignTool
        if: matrix.target == 'windows'
        shell: pwsh
        run: |
          Invoke-WebRequest -Uri "https://www.ssl.com/download/codesigntool-for-windows/" -OutFile "CodeSignTool.zip"
          Expand-Archive -Path CodeSignTool.zip -DestinationPath CodeSignTool -Force
          $bat = Get-ChildItem -Path CodeSignTool -Recurse -Filter "CodeSignTool.bat" | Select-Object -First 1
          if (-not $bat) { throw "CodeSignTool.bat not found after extraction" }
          "CODE_SIGN_TOOL_PATH=$($bat.DirectoryName)" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8

      - name: Cache Composer
        uses: actions/cache@v4
        with:
          path: |
            ~/.composer/cache
            vendor
          key: composer-${{ runner.os }}-${{ hashFiles('composer.lock') }}
          restore-keys: composer-${{ runner.os }}-

      - name: Install dependencies
        run: |
          composer install --no-dev --prefer-dist --no-progress
          npm ci

      - name: Use .env.deploy as runtime .env
        shell: bash
        run: |
          if [ -f .env.deploy ]; then
            cp .env.deploy .env
          elif [ -f .env.example ]; then
            cp .env.example .env
          else
            touch .env
          fi
          php artisan key:generate --force || true

      - name: Configure NativeBlade
        run: php artisan nativeblade:config

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            ~/.cargo/bin
            src-tauri/target
          key: cargo-desktop-${{ matrix.target }}-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: cargo-desktop-${{ matrix.target }}-

      - name: Import Apple signing certificate
        if: matrix.target == 'macos' && env.APPLE_CERTIFICATE != ''
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          echo "$APPLE_CERTIFICATE" | base64 --decode > $RUNNER_TEMP/cert.p12

          security create-keychain -p ci $RUNNER_TEMP/build.keychain
          security set-keychain-settings -lut 21600 $RUNNER_TEMP/build.keychain
          security default-keychain -s $RUNNER_TEMP/build.keychain
          security unlock-keychain -p ci $RUNNER_TEMP/build.keychain

          security import $RUNNER_TEMP/cert.p12 \
            -P "$APPLE_CERTIFICATE_PASSWORD" \
            -A -t cert -f pkcs12 -k $RUNNER_TEMP/build.keychain
          security set-key-partition-list -S apple-tool:,apple: -s -k ci $RUNNER_TEMP/build.keychain

      - name: Build Desktop
        env:
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: php artisan nativeblade:build desktop

      - name: Locate artifacts
        id: artifacts
        shell: bash
        run: |
          mkdir -p artifacts
          case "${{ matrix.target }}" in
            windows)
              find build/desktop src-tauri/target/release/bundle -type f \( -name "*.msi" -o -name "*.exe" \) 2>/dev/null \
                | head -5 | xargs -I {} cp {} artifacts/ || true
              ;;
            macos)
              find build/desktop src-tauri/target/release/bundle -type f \( -name "*.dmg" -o -name "*.app.tar.gz" \) 2>/dev/null \
                | head -5 | xargs -I {} cp {} artifacts/ || true
              ;;
            linux)
              find build/desktop src-tauri/target/release/bundle -type f \( -name "*.deb" -o -name "*.rpm" -o -name "*.AppImage" \) 2>/dev/null \
                | head -5 | xargs -I {} cp {} artifacts/ || true
              ;;
          esac

          COUNT=$(find artifacts -type f | wc -l)
          if [ "$COUNT" -eq 0 ]; then
            echo "::error::No artifacts produced for ${{ matrix.target }}"
            exit 1
          fi
          echo "Produced $COUNT artifact(s) for ${{ matrix.target }}:"
          ls -la artifacts/

      - name: Sign Windows artifacts with SSL.com
        if: matrix.target == 'windows'
        shell: pwsh
        env:
          SSL_USERNAME: ${{ secrets.SSL_USERNAME }}
          SSL_PASSWORD: ${{ secrets.SSL_PASSWORD }}
          SSL_CREDENTIAL_ID: ${{ secrets.SSL_CREDENTIAL_ID }}
          SSL_TOTP_SECRET: ${{ secrets.SSL_TOTP_SECRET }}
        run: |
          $bat = Join-Path $env:CODE_SIGN_TOOL_PATH "CodeSignTool.bat"
          Get-ChildItem -Path artifacts -Include *.exe,*.msi -Recurse | ForEach-Object {
              Write-Host "Signing: $($_.FullName)"
              & $bat sign `
                  -username="$env:SSL_USERNAME" `
                  -password="$env:SSL_PASSWORD" `
                  -credential_id="$env:SSL_CREDENTIAL_ID" `
                  -totp_secret="$env:SSL_TOTP_SECRET" `
                  -input_file_path="$($_.FullName)" `
                  -override
              if ($LASTEXITCODE -ne 0) { throw "CodeSignTool failed on $($_.Name)" }
          }

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: desktop-${{ matrix.target }}
          path: artifacts/*

  upload-to-s3:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download Windows artifacts
        uses: actions/download-artifact@v4
        with:
          name: desktop-windows
          path: ./release/windows

      - name: Download macOS artifacts
        uses: actions/download-artifact@v4
        with:
          name: desktop-macos
          path: ./release/macos

      - name: Download Linux artifacts
        uses: actions/download-artifact@v4
        with:
          name: desktop-linux
          path: ./release/linux

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Upload to S3
        run: |
          aws s3 sync ./release/windows/ s3://${{ env.S3_BUCKET }}/windows/ --delete
          aws s3 sync ./release/macos/   s3://${{ env.S3_BUCKET }}/macos/   --delete
          aws s3 sync ./release/linux/   s3://${{ env.S3_BUCKET }}/linux/   --delete

      - name: Print download URLs
        run: |
          echo "============================================"
          echo "Upload complete"
          echo "============================================"
          echo "Windows: https://${{ env.S3_BUCKET }}.s3.${{ env.AWS_REGION }}.amazonaws.com/windows/"
          echo "macOS:   https://${{ env.S3_BUCKET }}.s3.${{ env.AWS_REGION }}.amazonaws.com/macos/"
          echo "Linux:   https://${{ env.S3_BUCKET }}.s3.${{ env.AWS_REGION }}.amazonaws.com/linux/"
