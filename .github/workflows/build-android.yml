name: Build Android

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    env:
      JAVA_VERSION: '17'
      NODE_VERSION: '20'
      PHP_VERSION: '8.3'
      NDK_VERSION: '26.1.10909125'

    steps:
      # ─────────────────────────────────────────────────────────────
      # 1. Checkout
      # ─────────────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ─────────────────────────────────────────────────────────────
      # 2. Toolchains (JDK, Android SDK + NDK, PHP, Node, Rust)
      # ─────────────────────────────────────────────────────────────
      - name: Setup JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: ${{ env.JAVA_VERSION }}

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platform-tools platforms;android-35 build-tools;35.0.0 ndk;${{ env.NDK_VERSION }}'

      - name: Export NDK paths
        run: |
          echo "ANDROID_NDK_HOME=$ANDROID_SDK_ROOT/ndk/${{ env.NDK_VERSION }}" >> $GITHUB_ENV
          echo "ANDROID_NDK_ROOT=$ANDROID_SDK_ROOT/ndk/${{ env.NDK_VERSION }}" >> $GITHUB_ENV
          echo "NDK_HOME=$ANDROID_SDK_ROOT/ndk/${{ env.NDK_VERSION }}" >> $GITHUB_ENV

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ env.PHP_VERSION }}
          extensions: mbstring, intl, dom, fileinfo, sqlite3, pdo_sqlite, gd
          coverage: none
          tools: composer:v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          COMPOSER_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,x86_64-linux-android,i686-linux-android

      # ─────────────────────────────────────────────────────────────
      # 3. Caches (Composer, Gradle — cargo cache comes after platform
      #    scaffolding so it can hash the right Cargo.lock)
      # ─────────────────────────────────────────────────────────────
      - name: Cache Composer
        uses: actions/cache@v4
        with:
          path: |
            ~/.composer/cache
            vendor
          key: composer-${{ hashFiles('composer.lock') }}
          restore-keys: composer-

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-android-${{ hashFiles('src-tauri/gen/android/**/*.gradle*', 'src-tauri/gen/android/**/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-android-
            gradle-

      # ─────────────────────────────────────────────────────────────
      # 4. Project dependencies + runtime env
      # ─────────────────────────────────────────────────────────────
      - name: Install PHP/JS dependencies
        run: |
          composer install --no-dev --prefer-dist --no-progress
          npm ci

      - name: Use .env.deploy as runtime .env
        run: |
          if [ -f .env.deploy ]; then
            cp .env.deploy .env
          elif [ -f .env.example ]; then
            cp .env.example .env
          else
            touch .env
          fi
          php artisan key:generate --force || true

      # ─────────────────────────────────────────────────────────────
      # 5. Native scaffolding (creates src-tauri/gen/android + locks)
      # ─────────────────────────────────────────────────────────────
      - name: Add Android platform
        run: php artisan nativeblade:add android

      - name: Configure NativeBlade
        run: php artisan nativeblade:config

      # ─────────────────────────────────────────────────────────────
      # 6. Cargo cache. Swatinem/rust-cache prunes stale target/ entries
      #    so it stays under the 10GB actions/cache size limit between
      #    runs, and hashes Cargo.{toml,lock} + rust-toolchain for keys.
      # ─────────────────────────────────────────────────────────────
      - name: Cache Cargo (registry + target)
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          key: android
          cache-on-failure: true
          shared-key: portal-android

      # ─────────────────────────────────────────────────────────────
      # 7. Signing
      # ─────────────────────────────────────────────────────────────
      - name: Decode keystore
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          mkdir -p src-tauri/gen/android
          echo "$ANDROID_KEYSTORE_BASE64" | base64 --decode > src-tauri/gen/android/upload-keystore.jks
          if [ ! -s src-tauri/gen/android/upload-keystore.jks ]; then
            echo "::error::Keystore decode failed (empty file). Check ANDROID_KEYSTORE_BASE64 secret."
            exit 1
          fi

      - name: Configure signing
        env:
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          ALIAS="${ANDROID_KEY_ALIAS:-upload}"
          KEYPASS="${ANDROID_KEY_PASSWORD:-$ANDROID_KEYSTORE_PASSWORD}"
          php artisan nativeblade:sign android \
            --keystore-path="$(pwd)/src-tauri/gen/android/upload-keystore.jks" \
            --keystore-password="$ANDROID_KEYSTORE_PASSWORD" \
            --key-password="$KEYPASS" \
            --alias="$ALIAS"

      # ─────────────────────────────────────────────────────────────
      # 8. Build
      # ─────────────────────────────────────────────────────────────
      - name: Build Android
        run: php artisan nativeblade:build android

      # ─────────────────────────────────────────────────────────────
      # 9. Artifacts
      # ─────────────────────────────────────────────────────────────
      - name: Locate artifacts
        id: artifacts
        run: |
          AAB=$(find build/android src-tauri/gen/android -name "*.aab" | head -n 1)
          APK=$(find build/android src-tauri/gen/android -name "*.apk" | head -n 1)

          if [ -z "$AAB" ] && [ -z "$APK" ]; then
            echo "::error::No AAB or APK produced"
            exit 1
          fi

          [ -n "$AAB" ] && echo "aab=$AAB" >> "$GITHUB_OUTPUT" && echo "Built AAB: $AAB"
          [ -n "$APK" ] && echo "apk=$APK" >> "$GITHUB_OUTPUT" && echo "Built APK: $APK"

      - name: Upload AAB artifact
        if: steps.artifacts.outputs.aab != ''
        uses: actions/upload-artifact@v4
        with:
          name: android-aab
          path: ${{ steps.artifacts.outputs.aab }}
          retention-days: 14

      - name: Upload APK artifact
        if: steps.artifacts.outputs.apk != ''
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: ${{ steps.artifacts.outputs.apk }}
          retention-days: 14
